<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pages — Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/design-tokens.css" />
<link rel="stylesheet" href="../css/layout.css" />
<style>
.page-preview-card {
  background: var(--color-surface);
  border: 1px solid var(--color-gray-200);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: border-color var(--transition-fast);
  margin-bottom: var(--space-6);
}

.page-preview-card:hover {
  border-color: var(--color-gray-400);
}

.page-preview-thumb {
  position: relative;
  width: 100%;
  height: 400px;
  overflow: hidden;
  background: var(--color-bg);
  border-bottom: 1px solid var(--color-gray-200);
}

.page-preview-thumb iframe {
  width: 100%;
  height: 100%;
  border: 0;
  pointer-events: none;
}

.page-preview-info {
  padding: var(--space-5);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-4);
}

.page-preview-info h3 {
  font-size: var(--text-lg);
  font-weight: var(--font-weight-semibold);
  margin: 0 0 var(--space-1) 0;
}

.page-preview-info .description {
  font-size: var(--text-sm);
  color: var(--color-gray-400);
  margin: 0;
  line-height: var(--line-height-base);
}

.page-preview-meta {
  display: flex;
  gap: var(--space-2);
  margin-top: var(--space-3);
  flex-wrap: wrap;
}

.page-preview-actions {
  display: flex;
  gap: var(--space-2);
  align-items: center;
  flex-shrink: 0;
}

.page-preview-link {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  background: var(--color-ink);
  color: var(--color-surface);
  border-radius: var(--radius-full);
  font-size: var(--text-sm);
  font-weight: var(--font-weight-medium);
  transition: opacity var(--transition-fast);
  text-decoration: none;
}

.page-preview-link:hover {
  opacity: 0.85;
}

.page-preview-link .arrow {
  font-size: var(--text-xs);
  transition: transform var(--transition-fast);
}

.page-preview-link:hover .arrow {
  transform: translateX(2px);
}

@media (max-width: 768px) {
  .page-preview-thumb {
    height: 240px;
  }

  .page-preview-info {
    flex-direction: column;
  }

  .page-preview-actions {
    width: 100%;
  }

  .page-preview-link {
    width: 100%;
    justify-content: center;
  }
}
</style>
</head>
<body>

<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation">☰</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<aside class="sidebar">
  <div class="sidebar-header">
    <h2>Design System</h2>
    <div class="subtitle">2026 Portfolio</div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
</aside>

<main class="content">
  <div class="page-header">
    <h1>Pages</h1>
    <div class="description">Full page layouts composed from templates, organisms, molecules, and atoms</div>
  </div>

  <section class="page-section">
    <div class="page-preview-card">
      <div class="page-preview-thumb">
        <iframe src="home.html" title="Home page preview" loading="lazy"></iframe>
      </div>
      <div class="page-preview-info">
        <div>
          <h3>Home</h3>
          <p class="description">Full-viewport hero page with animated dithering border, headline logo, subtitle, and 5 CTA buttons in a 3+2 grid layout.</p>
          <div class="page-preview-meta">
            <span class="chip chip-neutral">Live WebGL shader</span>
            <span class="chip chip-neutral">Warp dithering</span>
            <span class="chip chip-neutral">Responsive</span>
          </div>
        </div>
        <div class="page-preview-actions">
          <a href="home.html" class="page-preview-link">
            Open Page <span class="arrow">→</span>
          </a>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="../js/docs.js"></script>
</body>
</html>
